name: Train Model

on:
  push:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - run: |
        pip install mlflow
        pip install pandas
        pip install numpy
        pip install scikit-learn

    - run: |
        cd MLProject
        mlflow run .